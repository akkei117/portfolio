<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanidhya Malviya</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Explore the portfolio of Sanidhya Malviya, a high-fidelity OS Terminal styled experience showcasing design, leadership, development, and shipping capabilities.">
  <meta name="keywords" content="Sanidhya Malviya, Portfolio, OS Terminal, Creative Developer, UI/UX, React">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  
  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ----------------------------------------------------
       DESIGN SYSTEM & CSS VARIABLES
       ---------------------------------------------------- */
    :root {
      --bg-dark: #0d0d1a;
      --terminal-canvas: rgba(37, 37, 64, 0.85);
      --terminal-canvas-solid: rgb(37, 37, 64);
      --text-main: rgb(133, 133, 167);
      --text-muted: rgba(133, 133, 167, 0.65);
      --color-green: rgb(105, 163, 134);
      --color-orange: rgb(187, 137, 110);
      --color-cyan: rgba(133, 133, 167, 0.85);
      --color-red: #f7768e;
      --color-yellow: rgb(187, 137, 110);
      --window-border: rgba(133, 133, 167, 0.2);
      --font-mono: 'Share Tech Mono', 'VT323', monospace;
      --font-sans: 'Outfit', sans-serif;
      --font-scale: 1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--font-sans);
      background-color: var(--bg-dark);
      color: var(--text-main);
    }

    /* ----------------------------------------------------
       COSMIC NEBULA BACKGROUND & EFFECTS
       ---------------------------------------------------- */
    .desktop-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, rgba(30, 20, 60, 0.6) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(10, 35, 60, 0.65) 0%, transparent 45%),
                  radial-gradient(ellipse at 50% 50%, #0c0a1a 0%, #030206 100%);
      background-size: 200% 200%;
      animation: nebulaShift 25s ease infinite alternate;
      z-index: 1;
    }

    .desktop-bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      pointer-events: none;
      transition: filter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body.terminal-active .desktop-bg-video {
      filter: brightness(1);
    }

    @keyframes nebulaShift {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    /* Interactive Ambient Glows */
    .ambient-glow {
      position: absolute;
      width: 45vw;
      height: 45vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 255, 102, 0.05) 0%, rgba(122, 162, 247, 0.03) 50%, transparent 100%);
      filter: blur(80px);
      z-index: 1;
      pointer-events: none;
      animation: floatGlow 15s ease-wrap infinite;
    }
    
    .glow-1 { top: 10%; left: 10%; }
    .glow-2 { bottom: 15%; right: 10%; animation-delay: -5s; }

    @keyframes floatGlow {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, -50px) scale(1.1); }
    }

    /* Stars Particles Overlay */
    .stars-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(1.5px 1.5px at 10% 20%, rgba(255, 255, 255, 0.8) 100%, transparent),
        radial-gradient(1px 1px at 30% 60%, rgba(255, 255, 255, 0.6) 100%, transparent),
        radial-gradient(1.5px 1.5px at 50% 40%, rgba(255, 255, 255, 0.75) 100%, transparent),
        radial-gradient(2px 2px at 75% 25%, rgba(0, 255, 102, 0.4) 100%, transparent),
        radial-gradient(1px 1px at 85% 80%, rgba(255, 255, 255, 0.5) 100%, transparent);
      background-repeat: repeat;
      background-size: 350px 350px;
      opacity: 0.45;
      z-index: 1;
      pointer-events: none;
    }

    /* CRT Screen Scanlines/Flicker */
    .crt-effect {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        rgba(18, 16, 16, 0) 50%, 
        rgba(0, 0, 0, 0.25) 50%
      ), linear-gradient(
        90deg,
        rgba(255, 0, 0, 0.03),
        rgba(0, 255, 0, 0.01),
        rgba(0, 0, 255, 0.03)
      );
      background-size: 100% 4px, 6px 100%;
      z-index: 999;
      pointer-events: none;
      opacity: 0.4;
    }

    /* ----------------------------------------------------
       PORTFOLIO OS CONTAINER & TERMINAL
       ---------------------------------------------------- */
    .desktop-container {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100vh;
      padding: 20px;
      z-index: 2;
    }

    .terminal-window {
      width: 100%;
      max-width: 1050px;
      height: 75vh;
      max-height: 700px;
      background-color: var(--terminal-canvas);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--window-border);
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                  0 0 40px rgba(122, 162, 247, 0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s, visibility 0.4s;
      position: absolute;
      font-size: calc(1rem * var(--font-scale));
    }

    .terminal-window.maximized {
      max-width: 98vw;
      max-height: 94vh;
      height: 94vh;
      --font-scale: 1.28;
    }

    .terminal-window.minimized {
      transform: scale(0.1) translateY(400px);
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.4s;
    }

    /* Window Title Bar */
    .window-title-bar {
      display: flex;
      align-items: center;
      height: 38px;
      background: rgba(30, 30, 53, 0.95);
      padding: 0 16px;
      border-bottom: 1px solid var(--window-border);
      user-select: none;
    }

    .window-dots {
      display: flex;
      gap: 8px;
      width: 100px;
    }

    .window-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      transition: transform 0.15s ease;
    }
    .window-dot:hover {
      transform: scale(1.15);
    }
    .window-dot.red { background-color: var(--color-red); }
    .window-dot.yellow { background-color: var(--color-yellow); }
    .window-dot.green { background-color: var(--color-green); }

    .window-title {
      flex: 1;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .window-actions-right {
      width: 100px;
      display: flex;
      justify-content: flex-end;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    /* ----------------------------------------------------
       CONTENT LAYOUTS
       ---------------------------------------------------- */
    .terminal-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: var(--font-mono);
      position: relative;
    }

    /* Boot Sequence Panel */
    .boot-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
      background-color: var(--terminal-canvas-solid);
      color: var(--color-green);
      font-size: 1rem;
      line-height: 1.6;
      overflow-y: auto;
    }

    .boot-line {
      margin-bottom: 6px;
      white-space: pre-wrap;
    }
    .boot-line.error { color: var(--color-red); }
    .boot-line.warning { color: var(--color-yellow); }
    .boot-line.accent { color: var(--color-orange); }

    .boot-progress-bar {
      margin: 15px 0;
      color: var(--color-green);
    }

    .boot-continue {
      margin-top: 20px;
      animation: pulseBlink 1.2s infinite;
      cursor: pointer;
      color: var(--color-orange);
      font-weight: bold;
    }

    @keyframes pulseBlink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* ----------------------------------------------------
       DASHBOARD VIEW WRAPPER & ELEMENTS (Ref: image)
       ---------------------------------------------------- */
    .dashboard-view-wrapper {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      gap: 16px;
      box-sizing: border-box;
    }

    .ascii-header-banner {
      font-family: var(--font-mono);
      font-size: calc(12.5px * var(--font-scale));
      line-height: calc(14.5px * var(--font-scale));
      color: var(--color-orange);
      font-weight: bold;
      text-align: left;
      white-space: pre;
      margin-bottom: 8px;
    }

    .dashboard-grid-box {
      display: grid;
      grid-template-columns: 46% 54%;
      border: 1px dashed rgba(133, 133, 167, 0.4);
      border-radius: 4px;
      background: rgba(37, 37, 64, 0.2);
    }

    .left-pane-box {
      padding: 20px;
      border-right: 1px dashed rgba(133, 133, 167, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
    }

    .right-pane-box {
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 22px;
    }

    .pane-title-welcome {
      font-size: 1.1em;
      font-weight: bold;
      color: var(--text-main);
    }

    .portrait-image {
      max-width: 100%;
      height: calc(200px * var(--font-scale));
      object-fit: cover;
      border: 1px dashed rgba(133, 133, 167, 0.4);
      border-radius: 4px;
      padding: 4px;
      opacity: 0.9;
      background: rgba(37, 37, 64, 0.4);
      transition: all 0.3s ease;
    }
    .portrait-image:hover {
      opacity: 1;
      border-color: var(--color-green);
    }

    .portrait-caption {
      font-size: 0.9em;
      line-height: 1.5;
      color: var(--text-muted);
    }

    /* Right Pane Capabilities Row Lists */
    .capabilities-section, .navigation-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-title {
      font-size: 1.05em;
      font-weight: bold;
      color: var(--color-orange);
      border-bottom: 1px dashed rgba(133, 133, 167, 0.2);
      padding-bottom: 4px;
    }

    .capabilities-list-table {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cap-list-row {
      display: flex;
      font-size: 0.9em;
      line-height: 1.4;
    }

    .cap-list-label {
      width: 90px;
      font-weight: bold;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .cap-list-value {
      color: var(--text-main);
    }

    /* Right Pane Navigation Links */
    .nav-links-column {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.9em;
    }

    .nav-link-item {
      color: var(--color-green);
      cursor: pointer;
      display: inline-block;
      width: fit-content;
    }
    .nav-link-item:hover {
      text-decoration: underline;
    }

    .nav-link-meta {
      color: var(--text-muted);
      font-style: italic;
    }

    /* Footer Cookie Notification */
    .dashboard-footer {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.82em;
    }

    .system-footer-notification {
      color: var(--text-muted);
      line-height: 1.4;
    }

    .footer-action-link {
      color: var(--color-cyan);
      text-decoration: underline;
      cursor: pointer;
    }
    .footer-action-link:hover {
      color: var(--color-green);
    }

    .footer-tip {
      color: var(--text-muted);
      font-style: italic;
      animation: pulseBlink 2.5s infinite;
    }

    /* Scrollbars Custom */
    .dashboard-view-wrapper::-webkit-scrollbar,
    .terminal-logs::-webkit-scrollbar {
      width: 6px;
    }
    .dashboard-view-wrapper::-webkit-scrollbar-thumb,
    .terminal-logs::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .music-player-window {
      position: absolute;
      top: 180px;
      right: 120px;
      width: 320px;
      background: rgba(37, 37, 64, 0.95);
      border: 1px solid var(--window-border);
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 99;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s, visibility 0.4s;
    }

    .music-player-window.minimized {
      transform: scale(0.1) translateY(400px);
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .music-player-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .mini-player-widget {
      width: 100%;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-sizing: border-box;
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75em;
      color: var(--color-orange);
      font-family: var(--font-mono);
    }

    .player-track-info {
      font-size: 0.8em;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
    }

    .player-seek-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7em;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    .player-seek-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .player-seek-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-green);
      transition: transform 0.1s;
    }
    .player-seek-slider::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    .player-controls-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .player-btn {
      background: transparent;
      border: none;
      color: var(--text-main);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, transform 0.1s;
    }
    .player-btn:hover {
      color: var(--color-green);
      transform: scale(1.1);
    }
    .player-btn:active {
      transform: scale(0.95);
    }
    .player-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ----------------------------------------------------
       CONSOLE & TERMINAL INTERACTION
       ---------------------------------------------------- */
    .console-input-row {
      display: flex;
      align-items: center;
      height: 45px;
      background: rgba(10, 11, 18, 0.95);
      border-top: 1px solid var(--window-border);
      padding: 0 16px;
      position: relative;
      z-index: 10;
    }

    .prompt-prefix {
      color: var(--color-green);
      margin-right: 10px;
      white-space: nowrap;
    }

    .terminal-input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      position: relative;
    }

    .main-terminal-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-family: var(--font-mono);
      font-size: 0.95rem;
      caret-color: var(--color-green);
    }

    .blinking-cursor {
      width: 8px;
      height: 15px;
      background-color: var(--color-green);
      display: inline-block;
      position: absolute;
      animation: cursorBlink 1s step-end infinite;
      pointer-events: none;
    }

    @keyframes cursorBlink {
      50% { opacity: 0; }
    }

    /* POP-UP AUTO-SUGGESTION OVERLAY */
    .suggestions-overlay {
      position: absolute;
      bottom: 45px;
      left: 16px;
      width: 320px;
      background: rgba(13, 15, 24, 0.95);
      border: 1px solid rgba(122, 162, 247, 0.2);
      border-radius: 8px;
      box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
      overflow: hidden;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .suggest-header {
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 12px;
      font-size: 0.7rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--window-border);
    }

    .suggest-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .suggest-item:hover, .suggest-item.active {
      background: rgba(0, 255, 102, 0.1);
      color: var(--color-green);
    }

    .suggest-cmd {
      color: var(--color-green);
      font-weight: bold;
    }
    .suggest-desc {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    /* Scrollable Terminal Output History Log (overlay display) */
    .terminal-logs {
      position: absolute;
      top: 38px;
      left: 0;
      width: 100%;
      height: calc(100% - 83px);
      background: var(--terminal-canvas-solid);
      padding: 20px;
      overflow-y: auto;
      z-index: 8;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .log-entry {
      line-height: 1.5;
      font-size: 0.9rem;
      animation: entryFade 0.2s ease-out;
    }

    @keyframes entryFade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .log-input-line {
      color: var(--color-cyan);
      margin-bottom: 4px;
    }

    .log-output-content {
      color: var(--text-main);
      white-space: pre-wrap;
      padding-left: 10px;
    }

    .close-logs-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-main);
      padding: 4px 10px;
      font-size: 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      z-index: 9;
    }
    .close-logs-btn:hover {
      background: var(--color-orange);
      color: var(--bg-dark);
    }

    /* ----------------------------------------------------
       THE /EXIT MODAL
       ---------------------------------------------------- */
    .exit-modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #05070c;
      z-index: 99;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: powerOff 0.4s ease-out forwards;
    }

    @keyframes powerOff {
      from { filter: brightness(2) contrast(2); transform: scale(1.02); opacity: 0; }
      to { filter: brightness(1) contrast(1); transform: scale(1); opacity: 1; }
    }

    .exit-modal-content {
      width: 90%;
      max-width: 550px;
      background: rgba(15, 17, 26, 0.9);
      border: 1px solid var(--color-red);
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(255, 62, 62, 0.15);
      text-align: center;
      font-family: var(--font-mono);
    }

    .exit-alert {
      color: var(--color-red);
      font-size: 1.1rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .exit-metadata {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .exit-actions {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .exit-btn {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .exit-btn.primary {
      background: var(--color-green);
      color: var(--bg-dark);
      border: 1px solid var(--color-green);
    }
    .exit-btn.secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .exit-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.25);
    }

    /* ----------------------------------------------------
       APPLICATION DOCK
       ---------------------------------------------------- */
    .dock-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(15, 18, 28, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px 18px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4),

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const videoContainer = document.getElementById('intro-video-container');
      const startScreen = document.getElementById('start-click-screen');
      const video = document.getElementById('intro-video');
      const skipBtn = document.getElementById('skip-intro-btn');
      const fadeScreen = document.getElementById('intro-fade-screen');
      
      let introEnded = false;
      let startTriggered = false;
      
      const endIntroSequence = () => {
        if (introEnded) return;
        introEnded = true;
        
        videoContainer.classList.add('fade-out');
        if (video) video.pause();
        
        setTimeout(() => {
          videoContainer.style.display = 'none';
          fadeScreen.classList.add('fade-out');
          
          setTimeout(() => {
            fadeScreen.style.display = 'none';
            window.dispatchEvent(new Event('introFinished'));
          }, 2000);
        }, 1500);
      };

      const startIntroExperience = () => {
        if (startTriggered) return;
        startTriggered = true;
        
        startScreen.classList.add('fade-out');
        setTimeout(() => {
          startScreen.style.display = 'none';
        }, 500);
        
        if (video) {
          video.muted = false;
          const playPromise = video.play();
          if (playPromise !== undefined) {
            playPromise.catch(error => {
              console.log("Audio play blocked, fallback to muted:", error);
              video.muted = true;
              video.play();
            });
          }
        }
        
        if (skipBtn) {
          skipBtn.style.display = 'block';
        }
      };

      if (startScreen) {
        startScreen.addEventListener('click', startIntroExperience);
      }
      
      if (video) {
        video.addEventListener('ended', endIntroSequence);
      }
      
      if (skipBtn) {
        skipBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          endIntroSequence();
        });
      }
      
      window.addEventListener('keydown', (e) => {
        if (!startTriggered) {
          startIntroExperience();
        } else {
          if (e.key === 'Enter' || e.key === ' ') {
            endIntroSequence();
          }
        }
      });
    });
  </script>

      { text: "--------------------------------------------------------", instant: true },
      { text: "[system] System boot check completed successfully.", instant: true }
    ];

    // Typing text component with configurable speed
    function TypingText({ text, speed = 8, onComplete }) {
      const [displayed, setDisplayed] = useState("");
      
      useEffect(() => {
        let isMounted = true;
        let currentIdx = 0;
        setDisplayed("");
        
        const timer = setInterval(() => {
          if (currentIdx < text.length) {
            setDisplayed((prev) => prev + text.charAt(currentIdx));
            currentIdx++;
          } else {
            clearInterval(timer);
            if (onComplete && isMounted) {
              onComplete();
            }
          }
        }, speed);
        
        return () => {
          isMounted = false;
          clearInterval(timer);
        };
      }, [text, speed]);

      return <span>{displayed}</span>;
    }

    // Interactive progress/loading bar component
    function ProgressLoader({ onComplete }) {
      const [percent, setPercent] = useState(0);
      const barLength = 24;

      useEffect(() => {
        let currentPercent = 0;
        const interval = setInterval(() => {
          const increment = Math.floor(Math.random() * 8) + 4;
          currentPercent = Math.min(100, currentPercent + increment);
          setPercent(currentPercent);

          if (currentPercent >= 100) {
            clearInterval(interval);
            if (onComplete) {
              setTimeout(onComplete, 200);
            }
          }
        }, 80);

        return () => clearInterval(interval);
      }, [onComplete]);

      const filledCount = Math.round((percent / 100) * barLength);
      const emptyCount = barLength - filledCount;
      const bar = "█".repeat(filledCount) + " ".repeat(emptyCount);

      return (
        <span>
          SYS_METER: [{bar}] {percent}% {percent === 100 ? "done" : "loading..."}
        </span>
      );
    }

    function App() {
      const [sysState, setSysState] = useState("booting"); // booting | active | exited
      const [windowState, setWindowState] = useState("normal"); // normal | maximized | minimized
      const [visibleMessageCount, setVisibleMessageCount] = useState(0);
      const [showProgressBar, setShowProgressBar] = useState(false);
      const [showContinuePrompt, setShowContinuePrompt] = useState(false);
      const [terminalLogs, setTerminalLogs] = useState([]);
      const [history, setHistory] = useState([]);
      const [historyIndex, setHistoryIndex] = useState(-1);
      const [showLogsOverlay, setShowLogsOverlay] = useState(false);
      const [showSuggest, setShowSuggest] = useState(false);
      const [activeSuggestIdx, setActiveSuggestIdx] = useState(0);
      const [cmdInput, setCmdInput] = useState("");
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [currentTrackIdx, setCurrentTrackIdx] = useState(0);
      const [musicPlayerState, setMusicPlayerState] = useState("minimized"); // normal | minimized
      const [terminalPos, setTerminalPos] = useState({ x: 80, y: 80 });
      const [musicPos, setMusicPos] = useState({ x: 740, y: 150 });

      const handleDragStart = (e, setPos, currentPos) => {
        if (e.button !== 0) return;
        if (e.target.closest('.window-dot') || e.target.closest('.window-actions-right') || e.target.closest('button') || e.target.closest('a')) return;

        const startX = e.clientX - currentPos.x;
        const startY = e.clientY - currentPos.y;

        const handleMouseMove = (moveEvent) => {
          setPos({
            x: moveEvent.clientX - startX,
            y: moveEvent.clientY - startY
          });
        };

        const handleMouseUp = () => {
          document.removeEventListener('mousemove', handleMouseMove);
          document.removeEventListener('mouseup', handleMouseUp);
        };

        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
      };
      
      const inputRef = useRef(null);
      const logsEndRef = useRef(null);
      const bootEndRef = useRef(null);
      const consoleInputRef = useRef(null);
      const isFirstLoad = useRef(true);
      const audioRef = useRef(null);

      // Focus Input hook
      const focusConsole = () => {
        if (consoleInputRef.current) {
          consoleInputRef.current.focus();
        }
      };

      // Audio player listeners hook
      useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;
        
        const updateTime = () => setCurrentTime(audio.currentTime);
        const updateDuration = () => setDuration(audio.duration || 0);
        const handleTrackEnded = () => {
          nextTrack();
        };
        
        audio.addEventListener('timeupdate', updateTime);
        audio.addEventListener('loadedmetadata', updateDuration);
        audio.addEventListener('ended', handleTrackEnded);
        
        return () => {
          audio.removeEventListener('timeupdate', updateTime);
          audio.removeEventListener('loadedmetadata', updateDuration);
          audio.removeEventListener('ended', handleTrackEnded);
        };
      }, [sysState]);

      // Effect to load and auto-play new tracks when selected/skipped
      useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;
        
        audio.load();
        if (isPlaying) {
          audio.play().catch(err => console.log("Auto-play on track change failed:", err));
        }
      }, [currentTrackIdx]);

      const togglePlay = () => {
        if (!audioRef.current) return;
        if (isPlaying) {
          audioRef.current.pause();
          setIsPlaying(false);
        } else {
          audioRef.current.play().then(() => {
            setIsPlaying(true);
          }).catch(err => console.log("Audio playback failed:", err));
        }
      };

      const skipForward = () => {
        if (!audioRef.current) return;
        audioRef.current.currentTime = Math.min(audioRef.current.duration, audioRef.current.currentTime + 10);
      };

      const skipBackward = () => {
        if (!audioRef.current) return;
        audioRef.current.currentTime = Math.max(0, audioRef.current.currentTime - 10);
      };

      const playTrack = (idx) => {
        setCurrentTrackIdx(idx);
        setIsPlaying(true);
      };

      const nextTrack = () => {
        setCurrentTrackIdx(prev => (prev + 1) % PLAYLIST.length);
      };

      const prevTrack = () => {
        setCurrentTrackIdx(prev => (prev - 1 + PLAYLIST.length) % PLAYLIST.length);
      };

      const handleSeekChange = (e) => {
        if (!audioRef.current) return;
        const seekValue = parseFloat(e.target.value);
        audioRef.current.currentTime = seekValue;
        setCurrentTime(seekValue);
      };

      const formatTime = (time) => {
        if (isNaN(time)) return "00:00";
        const mins = Math.floor(time / 60);
        const secs = Math.floor(time % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };

      // Toggle blur on background video when terminal goes active
      useEffect(() => {
        if (sysState === "active") {
          document.body.classList.add("terminal-active");
        } else {
          document.body.classList.remove("terminal-active");
        }
      }, [sysState]);

      // Redirect global clicks inside window to console input
      useEffect(() => {
        const handleGlobalClick = (e) => {
          if (sysState === "active" && !showLogsOverlay) {
            focusConsole();
          }
        };
        document.addEventListener("click", handleGlobalClick);
        return () => document.removeEventListener("click", handleGlobalClick);
      }, [sysState, showLogsOverlay]);

      // System boot logs simulator
      useEffect(() => {
        if (sysState === "booting") {
          if (isFirstLoad.current) {
            const startBooting = () => {
              setVisibleMessageCount(1);
            };
            window.addEventListener('introFinished', startBooting);
            isFirstLoad.current = false;
            return () => window.removeEventListener('introFinished', startBooting);

      }, [sysState]);

      // Auto-progress logs that don't use typing effect (instant rendering)
      useEffect(() => {
        if (sysState !== "booting" || visibleMessageCount === 0) return;
        
        const lastMsg = BOOT_MESSAGES[visibleMessageCount - 1];
        if (lastMsg && lastMsg.instant) {
          const timer = setTimeout(() => {

          }, 120);
          return () => clearTimeout(timer);

      }, [visibleMessageCount, sysState]);

      const handleLineComplete = () => {
        if (visibleMessageCount < BOOT_MESSAGES.length) {
          setTimeout(() => {
            setVisibleMessageCount(prev => prev + 1);
          }, 100);
        } else {
          setTimeout(() => {

        }
      };

      // Auto-scroll boot screen and logs
      useEffect(() => {
        if (bootEndRef.current) {

      }, [visibleMessageCount, showProgressBar, showContinuePrompt]);

      useEffect(() => {
        if (logsEndRef.current) {

        }

      useEffect(() => {
        const handleBootKeyPress = (e) => {
          if (sysState === "booting" && e.key === "Enter") {
            if (showContinuePrompt) {
              setSysState("active");
            }
          }
        };
        window.addEventListener("keydown", handleBootKeyPress);
        return () => window.removeEventListener("keydown", handleBootKeyPress);
      }, [sysState, showContinuePrompt]);

      const startSystem = () => {
        setSysState("active");
      };

      // Slash command parsing router
      const executeCommand = (cmdStr) => {
        const trimmed = cmdStr.trim();
        if (!trimmed) return;

        const newLog = {
          command: trimmed,
          output: ""
        };

        // Append to local history array
        const updatedHistory = [...history, trimmed];
        setHistory(updatedHistory);
        setHistoryIndex(updatedHistory.length);

        const route = trimmed.toLowerCase();
        
        switch (route) {
          case "/help":
            newLog.output = Object.entries(COMMAND_HELP)
              .map(([cmd, desc]) => `  ${cmd.padEnd(12)} - ${desc}`)
              .join("\n");
            break;
            
          case "/about":
            newLog.output = `
USER CARD: SANIDHYA MALVIYA
=========================================
I'm a Computer Science undergraduate with a strong interest in AI agents , LLM orchestration and problem-solving.
Currently focused on building real world AI agents which aims in improving productivity and reducing time required and humman efforts.

I believe in learning by building, contributing to communities, and continuously upgrading my technical skills.
=========================================
            `;
            break;

          case "/experience":
            newLog.output = `
  Experience:
  =========================================
  SDE Intern | Credit Samadhaan
      May 2026 - July 2026
          
    > Worked on development of a lifestyle app called Raiseonic.
    > Created LLM orchestration for generating production grade credit improvement plan.
    > Created a blog generating ai agent following the principles of AIO(Artificial Intelligence Optimization).
    > Following Git-based workflows, debugging issues, and writing clean, maintainable code.
    > Worked with opensource ai model(like Gemma4 Qwen3.5 , Lamma3 , Deepseek R1, KIMI , etc) and LLM inference tech(like Groq , LM flow , fireworks ai) for automating repetative tasks .
  =========================================
`;
            break;

          case "/skills":
            newLog.output = CAPABILITIES.map(c => {
              return `[${c.category.toUpperCase()}] \n  -> ${c.skills.join(", ")}`;
            }).join("\n\n");
            break;

          case "/contact":
            newLog.output = `
TRANSMISSION CHANNELS:
=========================================
EMAIL    : malviyasanidhya17@gmail.com
LINKEDIN : https://www.linkedin.com/in/sanidhya-malviya-abb045373/
GITHUB   : https://github.com/akkei117
X        : https://x.com/akkei17
            `;
            break;

          case "/history":
            newLog.output = updatedHistory.length > 0 
              ? updatedHistory.map((h, i) => `  ${i + 1}  ${h}`).join("\n")
              : "Command stream buffer is currently empty.";
            break;

          case "/clear":
            setTerminalLogs([]);
            return;

          case "/projects":
            newLog.output = `

`;
            break;

          case "/exit":
            setSysState("exited");
            return;

          default:
            newLog.output = `Error: Terminal command '${trimmed}' not recognized. \nTry typing '/help' to inspect command directory.`;
        }

        setTerminalLogs(prev => [...prev, newLog]);
        setShowLogsOverlay(true);
      };

      // Suggested list based on text input
      const handleInputChange = (e) => {
        const val = e.target.value;
        setCmdInput(val);
        if (val.trim().length > 0) {
          setShowSuggest(true);
        } else {
          setShowSuggest(false);
        }
        setActiveSuggestIdx(0);
      };

      // Filtered commands based on text input
      const getFilteredCommands = () => {
        const val = cmdInput.toLowerCase().trim();
        if (!val) return [];
        const searchVal = val.startsWith("/") ? val : "/" + val;
        return Object.keys(COMMAND_HELP).filter(cmd => cmd.startsWith(searchVal));
      };

      // Keyboard navigation for suggestions overlay & command history
      const handleInputKeyDown = (e) => {
        const filtered = getFilteredCommands();

        if (showSuggest && filtered.length > 0) {
          if (e.key === "ArrowDown") {
            e.preventDefault();
            setActiveSuggestIdx(prev => (prev + 1) % filtered.length);
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            setActiveSuggestIdx(prev => (prev - 1 + filtered.length) % filtered.length);
          } else if (e.key === "Enter") {
            e.preventDefault();
            const chosenCmd = filtered[activeSuggestIdx];
            setCmdInput(chosenCmd);
            setShowSuggest(false);
          } else if (e.key === "Escape") {
            setShowSuggest(false);
          }
          return;
        }

        // History navigation (Up/Down arrow keys)
        if (e.key === "ArrowUp") {
          e.preventDefault();
          if (history.length === 0) return;
          const newIdx = historyIndex > 0 ? historyIndex - 1 : 0;
          setHistoryIndex(newIdx);
          setCmdInput(history[newIdx]);
        } else if (e.key === "ArrowDown") {
          e.preventDefault();
          if (history.length === 0) return;
          const newIdx = historyIndex < history.length - 1 ? historyIndex + 1 : history.length;
          setHistoryIndex(newIdx);
